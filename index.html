    let idx = 0;

// ── SMART SCHEDULE HELPERS ───────────────────────────────────────────────────
// Workout types grouped by "heaviness" — used to avoid back-to-back heavy days
const HEAVY = ["Push", "Pull", "Legs"];
const LIGHT = ["Bodyweight Push", "Bodyweight Pull", "Bodyweight Legs"];
const WORKOUT_DAYS = [...HEAVY, ...LIGHT];
// Generate a semi-random but valid weekly schedule for N workout days
// Rules: no two heavy compound days back-to-back, rest days spread evenly,
// always includes at least one push, one pull, one legs in a full week
function generateSchedule(numDays) {
    const base = [...SCHEDULES[numDays] || SCHEDULES[3]];
    // Collect the workout slots (non-Rest positions)
    const workoutSlots = base.map((v, i) => v !== "Rest" ? i : null).filter(i => i !== null);
    const workoutTypes = workoutSlots.map(i => base[i]);
    // Lightly shuffle workout types while keeping push/pull/legs balanced
    // Swap pairs randomly a few times
    const shuffled = [...workoutTypes];
    const swaps = Math.floor(Math.random() * 3) + 1;
    for (let s = 0; s < swaps; s++) {
        const a = Math.floor(Math.random() * shuffled.length);
        const b = Math.floor(Math.random() * shuffled.length);
        // Only swap if neither swap creates two heavy back-to-back
        const testSchedule = [...base];
        [shuffled[a], shuffled[b]] = [shuffled[b], shuffled[a]];
        workoutSlots.forEach((slot, idx) => { testSchedule[slot] = shuffled[idx]; });
        let valid = true;
        for (let i = 0; i < 6; i++) {
            if (HEAVY.includes(testSchedule[i]) && HEAVY.includes(testSchedule[i + 1])) {
                valid = false;
                break;
            }
        }
        if (!valid)
            [shuffled[a], shuffled[b]] = [shuffled[b], shuffled[a]]; // undo swap
    }
    const result = [...base];
    workoutSlots.forEach((slot, idx) => { result[slot] = shuffled[idx]; });
    return result;
}
