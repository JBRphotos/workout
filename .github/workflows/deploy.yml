name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Build and upload main branch
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v2
        with:
          path: '.'
          retention-days: 1

      - name: Build and upload dev branch to staging
        if: github.ref == 'refs/heads/dev'
        uses: actions/upload-pages-artifact@v2
        with:
          path: '.'
          retention-days: 1

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
        with:
          artifact-id: ${{ github.ref == 'refs/heads/main' && 'github-pages' || 'github-pages-staging' }}
